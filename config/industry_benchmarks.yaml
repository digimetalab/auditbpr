# Industry Benchmarks — BPR Audit Intelligence System
# Source: OJK Banking Statistics, BPR Industry Reports
# Used by: Agents 02-05, 10, Orchestrator
# Note: Values are approximate national averages; update with latest OJK data

# ── National BPR Industry Averages ─────────────────────────────
capital:
  car_average_min: 22  # percent
  car_average_max: 26
  car_median: 24
  note: "Most BPRs maintain CAR well above the 12% minimum"

asset_quality:
  npl_gross_average_min: 7  # percent
  npl_gross_average_max: 9
  npl_gross_median: 6
  note: "Industry average exceeds the 5% OJK limit — many BPRs struggle with NPL"
  npl_trend: "Generally rising due to COVID-19 impact and economic slowdown"

profitability:
  roa_average_min: 2  # percent
  roa_average_max: 3
  roa_median: 2.5
  nim_average_min: 10
  nim_average_max: 14
  nim_median: 12
  note: "BPR NIMs are higher than commercial banks due to higher loan rates"

efficiency:
  bopo_average_min: 85  # percent
  bopo_average_max: 90
  bopo_median: 87
  note: "BPRs are inherently less efficient than commercial banks due to smaller scale"

liquidity:
  ldr_average_min: 75  # percent
  ldr_average_max: 85
  ldr_median: 80
  cash_ratio_average_min: 8
  cash_ratio_average_max: 15
  note: "Varies widely by region and BPR size"

# ── BPR Distribution by Health Rating ──────────────────────────
distribution:
  very_healthy: 15  # percent of BPRs
  healthy: 45
  fairly_healthy: 25
  unhealthy: 10
  very_unhealthy: 5
  note: "Based on composite CAMELS score; ~15% of BPRs are problem BPRs"

annual_closures:
  revoked_licenses: "3-8 BPRs per year (2019-2024)"
  common_causes:
    - "CAR below minimum (capital erosion)"
    - "NPL exceeding limits (deteriorating loan quality)"
    - "Fraud by management (insider lending, embezzlement)"
    - "Inability to meet depositor obligations"

# ── BPR Industry Size & Scale ──────────────────────────────────
total_bpr_count: 1400  # approximate, declining from ~1,600 in 2019
total_assets: 200000000  # ~Rp 200 trillion in thousands (industry-wide)

asset_distribution:
  large_bpr:
    label: "Assets > Rp 500 billion"
    share: 5  # percent of BPRs
  medium_bpr:
    label: "Assets Rp 100-500 billion"
    share: 20
  small_bpr:
    label: "Assets Rp 25-100 billion"
    share: 40
  very_small_bpr:
    label: "Assets < Rp 25 billion"
    share: 35

geographic:
  java_bali: 65  # percent of all BPRs
  sumatra: 15
  kalimantan: 8
  sulawesi: 7
  others: 5

# ── BPR Performance by Region ──────────────────────────────────
best_performing_regions:
  - "Bali — high NIM, low NPL, tourism-driven economy"
  - "DKI Jakarta — largest scale, competitive market"
  - "East Java — largest BPR count, diverse performance"

challenged_regions:
  - "Papua — limited infrastructure, high operational costs"
  - "NTT — low economic density, high NPL"
  - "Maluku — small market, limited deposit base"

# ── Key Industry Trends (2020-2024) ────────────────────────────
digital_transformation:
  - "OJK pushing digital banking for BPR (POJK 12/2018)"
  - "Mobile banking adoption still < 20% of BPRs"
  - "Core banking system modernization in progress"

consolidation:
  - "OJK encouraging mergers for undercapitalized BPRs"
  - "3-8 BPR license revocations annually"
  - "Trend toward fewer, larger, healthier BPRs"

regulatory_changes:
  - "Stricter fit & proper requirements (POJK 62/2020)"
  - "Enhanced PPKA requirements"
  - "Increased minimum capital requirements per zone"
  - "Digital reporting mandates"

risk_factors:
  - "Rising interest rates → higher cost of funds"
  - "Competition from fintech and digital banks"
  - "COVID-19 restructured loans maturing"
  - "Increased OJK supervision intensity"
